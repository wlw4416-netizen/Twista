<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>デッキ一覧 | ツイン・スターリング</title>
    <link rel="stylesheet" href="./styles.css" />
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4120574002433769" crossorigin="anonymous"></script>
  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <p class="brand"><a href="./index.html">ツイン・スターリング</a></p>
        <nav class="top-nav">
          <a href="./index.html">ホーム</a>
          <a href="./decks.html" aria-current="page">デッキ一覧</a>
          <a href="./articles.html">読み物</a>
          <a href="./rules.html">ルール</a>
        </nav>
      </div>
    </header>

    <main class="container page-main">
      <section class="panel">
        <p class="badge">Decks</p>
        <h1>デッキ一覧</h1>
        <p>
          公開デッキをタグで絞り込めます。データはページ内の JSON から生成しています（静的ホストのまま運用可能）。
          カード名・デッキ名はサイト用の作例です。
        </p>
      </section>

      <section class="panel" aria-labelledby="filter-heading">
        <h2 id="filter-heading">タグでフィルタ</h2>
        <p class="filter-hint" id="deck-count" aria-live="polite"></p>
        <div class="chips" id="deck-filters" role="group" aria-label="デッキのタグ"></div>
      </section>

      <section class="card-grid" id="deck-list" aria-live="polite"></section>
    </main>

    <aside class="ad-banner" aria-label="広告">
      <div class="container">
        <p class="ad-banner-label">広告</p>
        <div class="ad-banner-slot" id="site-ad-leaderboard">
          <!-- Google AdSense 等: index.html と同じ表示タグをここに貼り付け -->
        </div>
      </div>
    </aside>

    <footer class="site-footer">
      <div class="container">
        <p>このページは非公式のファンルール案です。</p>
      </div>
    </footer>

    <script>
      const DECK_TAGS = [
        { id: "all", label: "全て" },
        { id: "beginner", label: "初心者向け" },
        { id: "midrange", label: "中速" },
        { id: "combo", label: "コンボ" },
        { id: "multiplayer", label: "多人数戦向け" },
      ];

      const DECKS = [
        {
          title: "月光のステージ",
          leads: "主演: エルサ / ラプンツェル | 主題歌: 輝く未来",
          summary: "継続的なドローと盤面維持で終盤に伸びるバランス型。",
          tags: ["midrange", "multiplayer"],
        },
        {
          title: "海底オーケストラ",
          leads: "主演: アリエル / セバスチャン | 主題歌: アンダー・ザ・シー",
          summary: "テンポ重視で序盤から展開するアグロ寄り構成。",
          tags: ["beginner", "multiplayer"],
        },
        {
          title: "夢の王国レビュー",
          leads: "主演: ミッキー / ミニー | 主題歌: 星に願いを",
          summary: "全体シナジーを活かして安定してロアを積み上げる。",
          tags: ["beginner", "midrange"],
        },
        {
          title: "星屑カーテンコール",
          leads: "主演: ティンカー・ベル / ピーター・パン | 主題歌: 第二の星へ",
          summary: "小回りの効くコンボパーツを束ね、一気にロアを狙う構成（例）。",
          tags: ["combo", "multiplayer"],
        },
      ];

      const filterEl = document.getElementById("deck-filters");
      const listEl = document.getElementById("deck-list");
      const countEl = document.getElementById("deck-count");
      let activeTag = "all";

      function deckMatches(deck) {
        if (activeTag === "all") return true;
        return deck.tags.includes(activeTag);
      }

      function renderFilters() {
        filterEl.innerHTML = "";
        DECK_TAGS.forEach((tag) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "chip chip-button";
          btn.textContent = tag.label;
          btn.dataset.tag = tag.id;
          btn.setAttribute("aria-pressed", tag.id === activeTag ? "true" : "false");
          btn.addEventListener("click", () => {
            activeTag = tag.id;
            renderFilters();
            renderList();
          });
          filterEl.appendChild(btn);
        });
      }

      function renderList() {
        const visible = DECKS.filter(deckMatches);
        countEl.textContent =
          visible.length === DECKS.length
            ? `全 ${DECKS.length} 件を表示`
            : `${visible.length} / ${DECKS.length} 件を表示（タグ: ${DECK_TAGS.find((t) => t.id === activeTag)?.label ?? activeTag}）`;

        listEl.innerHTML = "";
        if (visible.length === 0) {
          const empty = document.createElement("p");
          empty.className = "empty-state";
          empty.textContent = "このタグに該当するデッキがありません。別のタグを選んでください。";
          listEl.appendChild(empty);
          return;
        }

        visible.forEach((deck) => {
          const card = document.createElement("article");
          card.className = "list-card";
          const h = document.createElement("h3");
          h.textContent = deck.title;
          const meta = document.createElement("p");
          meta.className = "meta";
          meta.textContent = deck.leads;
          const body = document.createElement("p");
          body.textContent = deck.summary;
          const tagRow = document.createElement("p");
          tagRow.className = "tag-row";
          deck.tags.forEach((tid) => {
            const span = document.createElement("span");
            span.className = "tag-pill";
            span.textContent = DECK_TAGS.find((t) => t.id === tid)?.label ?? tid;
            tagRow.appendChild(span);
          });
          card.append(h, meta, body, tagRow);
          listEl.appendChild(card);
        });
      }

      renderFilters();
      renderList();
    </script>
  </body>
</html>
